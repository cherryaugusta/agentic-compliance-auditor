services:
  db:
    image: pgvector/pgvector:pg16
    container_name: aca_db
    environment:
      POSTGRES_DB: agentic_compliance
      POSTGRES_USER: agentic_user
      POSTGRES_PASSWORD: agentic_password
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aca_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: